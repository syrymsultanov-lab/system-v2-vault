<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Задачи — system v2</title>
  <link rel="icon" type="image/svg+xml" href="../assets/images/favicon.svg">
  <link rel="stylesheet" href="assets/css/dashboard.css">
  <style>
    .task-meta { display:flex; align-items:center; gap:8px; flex-wrap:wrap; margin-top:3px; }
    .task-due {
      font-size:11px; font-weight:700; padding:2px 8px; border-radius:7px;
      color:var(--td); background:var(--gl); border:1px solid var(--brd);
      font-family:'JetBrains Mono',monospace;
    }
    .task-due.overdue { color:var(--coral); background:rgba(255,107,107,.10); border-color:rgba(255,107,107,.25); }
    .task-due.today   { color:var(--sun);   background:rgba(255,183,3,.12);   border-color:rgba(255,183,3,.28); }
    .task-due.tomorrow{ color:var(--azure); background:rgba(0,180,216,.10);   border-color:rgba(0,180,216,.25); }
    .task-due.done    { color:var(--green); background:var(--grn-s);          border-color:rgba(6,214,160,.25); text-decoration:line-through; }
    .task-src {
      font-size:10px; font-weight:700; padding:2px 7px; border-radius:6px;
      color:var(--td); background:var(--gl); border:1px solid var(--brd);
    }
    .task-src.ai      { color:var(--azure); background:rgba(0,180,216,.10); border-color:rgba(0,180,216,.25); }
    .task-src.partner { color:var(--sky);   background:rgba(144,224,239,.10); border-color:rgba(144,224,239,.25); }
    .task-src.system  { color:var(--sun);   background:rgba(255,183,3,.10);  border-color:rgba(255,183,3,.25); }
    .task-link {
      font-size:11px; color:var(--azure); font-weight:600;
      text-decoration:none; padding:2px 7px; border-radius:6px;
      background:rgba(0,180,216,.06); border:1px solid var(--brd);
    }
    .task-link:hover { background:rgba(0,180,216,.14); }
    .ti.task-done { opacity:.55; }
    .ti.task-done .ti-t { text-decoration:line-through; color:var(--td); }
    .pri-dot { width:8px; height:8px; border-radius:50%; flex-shrink:0; }
    .pri-h { background:var(--coral); box-shadow:0 0 8px rgba(255,107,107,.5); }
    .pri-m { background:var(--sun); }
    .pri-l { background:var(--td); }
    .qa-row {
      display:flex; gap:6px; flex-wrap:wrap; margin-top:6px;
    }
    .qa-row .mbtn { padding:7px 10px; font-size:11px; flex:none; }
  </style>
</head>
<body>
<div id="app-header"></div>

<main class="main">
  <div class="welcome">
    <div>
      <h2>Задачи</h2>
      <p>To-do партнёра. Что-то создаёт <b>AI</b> по событиям лидов, что-то — <b>система</b> по календарю, что-то — <b>вы вручную</b>. Просрочки подсвечены.</p>
    </div>
    <div class="welcome-r"><div class="wdate">Сегодня: <b id="t-today-date">—</b></div></div>
  </div>

  <div class="stats">
    <div class="sc"><div class="sc-top"><div class="sc-icon si1">📅</div><div class="sc-trend tu" id="st-today-trend">—</div></div><div class="sc-val" id="st-today">0</div><div class="sc-lbl">На сегодня</div></div>
    <div class="sc"><div class="sc-top"><div class="sc-icon si2">🗓</div><div class="sc-trend tu"></div></div><div class="sc-val" id="st-week">0</div><div class="sc-lbl">На неделе</div></div>
    <div class="sc"><div class="sc-top"><div class="sc-icon si4">⚠️</div><div class="sc-trend tw" id="st-over-trend">—</div></div><div class="sc-val" id="st-over">0</div><div class="sc-lbl">Просрочено</div></div>
    <div class="sc"><div class="sc-top"><div class="sc-icon si3">✅</div><div class="sc-trend tu" id="st-done-trend">—</div></div><div class="sc-val" id="st-done">0</div><div class="sc-lbl">Выполнено</div></div>
  </div>

  <div class="pnl">
    <div class="pnl-h">
      <div class="pnl-t">📋 Список задач</div>
      <div class="pnl-tabs">
        <button class="mbtn mbtn-p" onclick="openAddTask()" style="flex:none;padding:7px 12px;font-size:12px">➕ Новая задача</button>
      </div>
    </div>

    <div class="pnl-tabs" id="t-filter-when" style="padding:0 2px 4px">
      <button class="pt active" data-w="all">Все</button>
      <button class="pt" data-w="overdue">⚠️ Просрочено</button>
      <button class="pt" data-w="today">📅 Сегодня</button>
      <button class="pt" data-w="tomorrow">➡️ Завтра</button>
      <button class="pt" data-w="week">🗓 На неделе</button>
      <button class="pt" data-w="done">✅ Выполнено</button>
    </div>
    <div class="pnl-tabs" id="t-filter-src" style="padding:0 2px 6px">
      <button class="pt active" data-s="all">Все источники</button>
      <button class="pt" data-s="ai">🤖 AI</button>
      <button class="pt" data-s="self">👤 Я</button>
      <button class="pt" data-s="system">⚙️ Система</button>
    </div>

    <div class="sch">
      <input type="text" id="t-search" class="sch-i" placeholder="🔍 Поиск по названию, описанию, имени лида/контакта…">
    </div>
    <div class="tl" id="t-list"></div>
    <div class="leads-empty" id="t-empty" style="display:none">
      <div class="stub-icon">📭</div>
      <p>По выбранным фильтрам задач нет.</p>
    </div>
  </div>
</main>

<!-- Task Detail Modal -->
<div class="modal" id="t-modal">
  <div class="modal-backdrop" onclick="closeTaskModal()"></div>
  <div class="modal-box">
    <button class="modal-close" onclick="closeTaskModal()">✕</button>
    <div id="t-modal-body"></div>
  </div>
</div>

<script src="assets/js/api.js"></script>
<script src="assets/js/dashboard.js"></script>
<script>
initDashboard('tasks');
requireAuth();

const TODAY = new Date(); TODAY.setHours(0,0,0,0);
function fmtDateBadge(d) {
  const m = ['янв','фев','мар','апр','май','июн','июл','авг','сен','окт','ноя','дек'];
  return `${d.getDate()} ${m[d.getMonth()]}`;
}
document.getElementById('t-today-date').textContent = fmtDateBadge(TODAY);

const SRC_MAP = {
  ai:     { label:'AI',      icon:'🤖' },
  self:   { label:'Я',       icon:'👤' },
  system: { label:'Система', icon:'⚙️' },
};
const TYPE_MAP = {
  call:     { label:'Звонок',     icon:'📞' },
  message:  { label:'Сообщение',  icon:'💬' },
  followup: { label:'Follow-up',  icon:'🔁' },
  meeting:  { label:'Встреча',    icon:'🤝' },
  reminder: { label:'Напоминание',icon:'🔔' },
  other:    { label:'Задача',     icon:'📌' },
};
const PRI_MAP = {
  high: { label:'Высокий', cls:'pri-h' },
  mid:  { label:'Средний', cls:'pri-m' },
  low:  { label:'Низкий',  cls:'pri-l' },
};

let TASKS = [];
let currentPartner = null;

function esc(s) {
  return String(s ?? '').replace(/[&<>"']/g, c => (
    { '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c]
  ));
}
function relatedOf(t) {
  if (t.lead) return { kind:'lead', id:t.lead_id, name:`${t.lead.name||''} ${t.lead.last_name||''}`.trim() };
  if (t.contact) return { kind:'contact', id:t.contact_id, name:t.contact.name };
  return null;
}

let whenFilter = 'all';
let srcFilter = 'all';
let tSearch = '';

// ===== helpers =====
function dueBucket(t) {
  if (t.done) return 'done';
  if (!t.due_at) return 'week';
  const d = new Date(t.due_at);
  const day0 = new Date(TODAY); day0.setHours(0,0,0,0);
  const day1 = new Date(day0); day1.setDate(day1.getDate()+1);
  const day2 = new Date(day0); day2.setDate(day2.getDate()+2);
  const day7 = new Date(day0); day7.setDate(day7.getDate()+7);
  if (d < day0) return 'overdue';
  if (d < day1) return 'today';
  if (d < day2) return 'tomorrow';
  if (d < day7) return 'week';
  return 'later';
}
function dueBadgeText(t) {
  if (t.done) return '✓ ' + (t.done_at ? fmtShort(t.done_at) : 'выполнено');
  if (!t.due_at) return 'без срока';
  const b = dueBucket(t);
  if (b === 'today')    return 'Сегодня · ' + fmtTime(t.due_at);
  if (b === 'tomorrow') return 'Завтра · ' + fmtTime(t.due_at);
  if (b === 'overdue')  return 'Просрочено · ' + fmtShort(t.due_at);
  return fmtShort(t.due_at);
}
function dueBadgeClass(t) {
  const b = dueBucket(t);
  if (b === 'overdue') return 'overdue';
  if (b === 'today')   return 'today';
  if (b === 'tomorrow')return 'tomorrow';
  if (b === 'done')    return 'done';
  return '';
}
function fmtTime(iso) {
  const d = new Date(iso);
  return `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
}
function fmtShort(iso) {
  const d = new Date(iso);
  return `${String(d.getDate()).padStart(2,'0')}.${String(d.getMonth()+1).padStart(2,'0')} ${fmtTime(iso)}`;
}

// ===== stats =====
function updateStats() {
  const today    = TASKS.filter(t => !t.done && dueBucket(t)==='today').length;
  const week     = TASKS.filter(t => !t.done && ['today','tomorrow','week'].includes(dueBucket(t))).length;
  const overdue  = TASKS.filter(t => !t.done && dueBucket(t)==='overdue').length;
  const done     = TASKS.filter(t => t.done).length;
  document.getElementById('st-today').textContent = today;
  document.getElementById('st-week').textContent  = week;
  document.getElementById('st-over').textContent  = overdue;
  document.getElementById('st-done').textContent  = done;
  document.getElementById('st-today-trend').textContent = today ? `+${today}` : '0';
  document.getElementById('st-over-trend').textContent  = overdue ? `!${overdue}` : '0';
  document.getElementById('st-done-trend').textContent  = done ? `+${done}` : '0';
}

// ===== render =====
function renderTasks() {
  const list = document.getElementById('t-list');
  const empty = document.getElementById('t-empty');
  const q = tSearch.toLowerCase().trim();

  let filtered = TASKS.filter(t => {
    const b = dueBucket(t);
    if (whenFilter === 'done')      { if (!t.done) return false; }
    else if (whenFilter !== 'all')  { if (t.done || b !== whenFilter) return false; }
    if (srcFilter !== 'all' && t.source !== srcFilter) return false;
    if (!q) return true;
    const rel = relatedOf(t)?.name || '';
    const hay = `${t.title||''} ${t.description||''} ${rel}`.toLowerCase();
    return hay.includes(q);
  });

  filtered.sort((a,b) => {
    if (a.done && !b.done) return 1;
    if (b.done && !a.done) return -1;
    if (a.done && b.done)  return new Date(b.done_at||0) - new Date(a.done_at||0);
    return new Date(a.due_at||0) - new Date(b.due_at||0);
  });

  if (filtered.length === 0) {
    list.innerHTML = '';
    empty.style.display = 'flex';
    return;
  }
  empty.style.display = 'none';

  list.innerHTML = filtered.map(t => {
    const src = SRC_MAP[t.source] || SRC_MAP.self;
    const tp  = TYPE_MAP[t.type]   || TYPE_MAP.other;
    const pri = PRI_MAP[t.priority]|| PRI_MAP.mid;
    const dueCls = dueBadgeClass(t);
    const dueTx  = dueBadgeText(t);
    const rel    = relatedOf(t);
    const relTx  = rel ? `<span class="task-link">${rel.kind==='lead'?'🎯':'📇'} ${esc(rel.name)}</span>` : '';
    return `
      <div class="ti lead-ti ${t.done?'task-done':''}" onclick="openTaskModal('${t.id}')">
        <div class="pri-dot ${pri.cls}" title="Приоритет: ${pri.label}"></div>
        <div class="ti-b">
          <div class="ti-t">${tp.icon} ${esc(t.title)}</div>
          <div class="task-meta">
            <span class="task-due ${dueCls}">${dueTx}</span>
            <span class="task-src ${t.source}">${src.icon} ${src.label}</span>
            ${relTx}
          </div>
        </div>
        ${t.done
          ? '<div class="tg tg3">✓ Готово</div>'
          : `<button class="mbtn mbtn-g" style="flex:none;padding:7px 11px;font-size:11px" onclick="event.stopPropagation();markDone('${t.id}')">✓ Готово</button>`
        }
      </div>`;
  }).join('');
}

// ===== filters =====
document.getElementById('t-filter-when').addEventListener('click', e => {
  const btn = e.target.closest('.pt');
  if (!btn) return;
  document.querySelectorAll('#t-filter-when .pt').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  whenFilter = btn.dataset.w;
  renderTasks();
});
document.getElementById('t-filter-src').addEventListener('click', e => {
  const btn = e.target.closest('.pt');
  if (!btn) return;
  document.querySelectorAll('#t-filter-src .pt').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  srcFilter = btn.dataset.s;
  renderTasks();
});
document.getElementById('t-search').addEventListener('input', e => { tSearch = e.target.value; renderTasks(); });

// ===== modal =====
function openTaskModal(id) {
  const t = TASKS.find(x => x.id === id);
  if (!t) return;
  const src = SRC_MAP[t.source] || SRC_MAP.self;
  const tp  = TYPE_MAP[t.type]   || TYPE_MAP.other;
  const pri = PRI_MAP[t.priority]|| PRI_MAP.mid;
  const dueCls = dueBadgeClass(t);
  const dueTx  = dueBadgeText(t);
  const rel    = relatedOf(t);
  const body = document.getElementById('t-modal-body');
  const relRow = rel
    ? `<div class="mg-row"><span class="mg-k">🔗 Связано с</span><a class="mg-v" href="${rel.kind==='lead'?'leads.html':'contacts.html'}">${rel.kind==='lead'?'🎯':'📇'} ${esc(rel.name)}</a></div>`
    : '';
  const completedRow = t.done
    ? `<div class="mg-row"><span class="mg-k">✓ Выполнено</span><span class="mg-v">${t.done_at ? fmtShort(t.done_at) : '—'}</span></div>`
    : '';
  body.innerHTML = `
    <div class="modal-head">
      <div class="la lead-ava">${tp.icon}</div>
      <div>
        <div class="modal-ttl">${esc(t.title)}</div>
        <div class="modal-sub">${tp.label} · приоритет: ${pri.label} · источник: ${src.icon} ${src.label}</div>
      </div>
      <div class="task-due ${dueCls}" style="margin-left:auto">${dueTx}</div>
    </div>
    <div class="modal-grid">
      <div class="mg-row" style="display:block">
        <div class="mg-k" style="margin-bottom:6px">📝 Описание</div>
        <div class="mg-v" style="text-align:left;font-weight:500;line-height:1.45">${esc(t.description || '—')}</div>
      </div>
      ${relRow}
      <div class="mg-row"><span class="mg-k">🕐 Срок</span><span class="mg-v">${t.due_at ? fmtShort(t.due_at) : 'без срока'}</span></div>
      ${completedRow}
    </div>
    ${t.done ? `
      <div class="modal-actions">
        <button class="mbtn mbtn-p" onclick="reopenTask('${t.id}')">↩️ Вернуть в работу</button>
        <button class="mbtn mbtn-r" onclick="deleteTask('${t.id}')">🗑 Удалить</button>
      </div>
    ` : `
      <div class="modal-actions">
        <button class="mbtn mbtn-g" onclick="markDone('${t.id}')">✅ Выполнено</button>
        <button class="mbtn mbtn-p" onclick="editTask('${t.id}')">✏️ Редактировать</button>
        <button class="mbtn mbtn-r" onclick="deleteTask('${t.id}')">🗑 Удалить</button>
      </div>
      <div class="qa-row">
        <span style="font-size:11px;color:var(--td);align-self:center;margin-right:4px">🕐 Отложить:</span>
        <button class="mbtn" onclick="snooze('${t.id}','1h')">+1ч</button>
        <button class="mbtn" onclick="snooze('${t.id}','3h')">+3ч</button>
        <button class="mbtn" onclick="snooze('${t.id}','tomorrow')">На завтра</button>
        <button class="mbtn" onclick="snooze('${t.id}','+1d')">+1 день</button>
        <button class="mbtn" onclick="snooze('${t.id}','+1w')">+1 неделя</button>
      </div>
    `}
  `;
  document.getElementById('t-modal').classList.add('active');
}
function closeTaskModal() { document.getElementById('t-modal').classList.remove('active'); }
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeTaskModal(); });

// ===== actions =====
function showToast(msg) {
  let el = document.getElementById('app-toast');
  if (!el) { el = document.createElement('div'); el.id='app-toast'; el.className='toast'; document.body.appendChild(el); }
  el.textContent = msg; el.classList.add('show');
  clearTimeout(showToast._tid);
  showToast._tid = setTimeout(() => el.classList.remove('show'), 2800);
}
async function patchTask(id, patch, optimistic) {
  const t = TASKS.find(x => x.id === id);
  if (!t) return;
  const prev = { ...t };
  Object.assign(t, optimistic || patch);
  closeTaskModal();
  renderTasks(); updateStats();
  try {
    await sb('PATCH', `tasks?id=eq.${id}`, { ...patch, updated_at: new Date().toISOString() });
  } catch (e) {
    console.error('patchTask:', e);
    Object.assign(t, prev);
    renderTasks(); updateStats();
    showToast('❌ Не удалось сохранить: ' + e.message);
  }
}
function markDone(id) {
  const now = new Date().toISOString();
  patchTask(id, { done:true, done_at:now }, { done:true, done_at:now });
  const t = TASKS.find(x => x.id === id);
  if (t) showToast(`✅ Задача выполнена: ${t.title}`);
}
function reopenTask(id) {
  patchTask(id, { done:false, done_at:null }, { done:false, done_at:null });
  openTaskModal(id);
  showToast(`↩️ Задача возвращена в работу`);
}
function snooze(id, mode) {
  const t = TASKS.find(x => x.id === id);
  if (!t) return;
  const now = new Date();
  let d = t.due_at ? new Date(t.due_at) : now;
  if (d < now) d = now;
  if      (mode === '1h')       d.setHours(d.getHours()+1);
  else if (mode === '3h')       d.setHours(d.getHours()+3);
  else if (mode === 'tomorrow') { d = new Date(TODAY); d.setDate(d.getDate()+1); d.setHours(9,0,0,0); }
  else if (mode === '+1d')      d.setDate(d.getDate()+1);
  else if (mode === '+1w')      d.setDate(d.getDate()+7);
  const iso = d.toISOString();
  patchTask(id, { due_at: iso }, { due_at: iso });
  openTaskModal(id);
  showToast(`🕐 Отложено до ${fmtShort(iso)}`);
}
async function deleteTask(id) {
  const t = TASKS.find(x => x.id === id);
  if (!t) return;
  if (!confirm(`Удалить задачу "${t.title}"?`)) return;
  const idx = TASKS.findIndex(x => x.id === id);
  const removed = TASKS.splice(idx, 1)[0];
  closeTaskModal();
  renderTasks(); updateStats();
  try {
    await sb('DELETE', `tasks?id=eq.${id}`);
    showToast('🗑 Задача удалена');
  } catch (e) {
    console.error('deleteTask:', e);
    TASKS.splice(idx, 0, removed);
    renderTasks(); updateStats();
    showToast('❌ Не удалось удалить: ' + e.message);
  }
}
function editTask(id) { showToast('✏️ Форма редактирования появится в следующей итерации.'); }
function openAddTask() { showToast('➕ Форма добавления задачи появится в следующей итерации.'); }

async function loadTasks() {
  const list = document.getElementById('t-list');
  try {
    currentPartner = await getCurrentPartner();
    if (!currentPartner) {
      list.innerHTML = '<div class="leads-empty"><p>Партнёр не найден. Обратитесь к администратору.</p></div>';
      return;
    }
    const sel = 'select=*,lead:leads(id,name,last_name),contact:contacts(id,name)';
    TASKS = await sb('GET', `tasks?partner_id=eq.${currentPartner.id}&${sel}&order=due_at.asc.nullslast`);
    updateStats(); renderTasks();
  } catch (e) {
    console.error('loadTasks:', e);
    list.innerHTML = `<div class="leads-empty"><p>Ошибка загрузки: ${esc(e.message)}</p></div>`;
  }
}

loadTasks();
</script>
</body>
</html>
